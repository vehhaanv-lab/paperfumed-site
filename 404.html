<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — PaperFumed</title>
<meta name="robots" content="noindex">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#090E16">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 26 33'%3E%3Crect x='8' y='0' width='10' height='6.5' rx='2' fill='%23EBE2CE'/%3E%3Cpath fill='%23EBE2CE' d='M2 8.5L2 31Q2 33 4 33L22 33Q24 33 24 31L24 14.5L16.5 8.5Z'/%3E%3Cpath fill='rgba(77,184,126,.5)' d='M16.5 8.5L24 14.5L16.5 14.5Z'/%3E%3C/svg%3E">
<style>
:root{--bg:#090E16;--c1:#EBE2CE;--c2:rgba(235,226,206,.55);--c3:rgba(235,226,206,.35);--c4:rgba(235,226,206,.09);--g:#4DB87E}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--c1);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;cursor:none}
a,button{cursor:none}
nav{display:flex;align-items:center;padding:0 4rem;height:68px;border-bottom:1px solid var(--c4)}
.n-logo{display:flex;align-items:center;gap:11px;text-decoration:none}
.n-word{font-size:.92rem;font-weight:600;letter-spacing:-.01em;color:var(--c1)}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4rem 2rem}
.label{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--c3);margin-bottom:2rem}
h1{font-family:'Fraunces',serif;font-size:clamp(2.5rem,8vw,5.5rem);font-weight:400;letter-spacing:-.04em;line-height:1.05;margin-bottom:1.5rem;color:var(--c1)}
h1 em{font-style:italic;color:var(--g)}
p{font-size:.92rem;color:var(--c2);font-weight:300;line-height:1.8;max-width:380px;margin-bottom:2.5rem}
.btn{display:inline-block;padding:.75rem 2rem;background:var(--g);color:#090E16;font-family:'Plus Jakarta Sans',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;border-radius:2px;transition:opacity .2s}
.btn:hover{opacity:.85;text-decoration:none}
footer{border-top:1px solid var(--c4);padding:1.5rem 4rem;display:flex;align-items:center;justify-content:space-between}
.f-word{font-size:.78rem;color:var(--c3);font-weight:300}
@media(max-width:768px){nav,footer{padding:0 1.5rem}}
@media(hover:none),(pointer:coarse){body{cursor:auto}#CUR,#CUR2{display:none!important}}
@media(prefers-reduced-motion:reduce){body{cursor:auto}#CUR,#CUR2{display:none!important}}
#CUR{position:fixed;z-index:9990;pointer-events:none;width:7px;height:7px;border-radius:50%;background:#4DB87E;transform:translate(-50%,-50%);transition:width .3s cubic-bezier(.16,1,.3,1),height .3s cubic-bezier(.16,1,.3,1),background .3s}
#CUR2{position:fixed;z-index:9989;pointer-events:none;width:30px;height:30px;border-radius:50%;border:1px solid rgba(77,184,126,.28);transform:translate(-50%,-50%);transition:opacity .3s}
.cbig #CUR{width:50px;height:50px;background:rgba(77,184,126,.07);border:1px solid rgba(77,184,126,.22)}
.cbig #CUR2{opacity:0}
</style>
</head>
<body>
<div id="CUR" aria-hidden="true"></div>
<div id="CUR2" aria-hidden="true"></div>
<nav>
  <a href="/" class="n-logo">
    <svg width="16" height="20" viewBox="0 0 26 33" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="0" width="10" height="6.5" rx="2" fill="#EBE2CE"/>
      <path fill="#EBE2CE" d="M2 8.5L2 31Q2 33 4 33L22 33Q24 33 24 31L24 14.5L16.5 8.5Z"/>
      <path fill="rgba(77,184,126,.5)" d="M16.5 8.5L24 14.5L16.5 14.5Z"/>
    </svg>
    <span class="n-word">PaperFumed</span>
  </a>
</nav>
<main>
  <p class="label">404 — Page not found</p>
  <h1>This page<br>doesn't <em>exist.</em><br>The bottle does.</h1>
  <p>Whatever you were looking for isn't here. But what comes after plastic is.</p>
  <a href="/" class="btn">Back to Home</a>
</main>
<footer>
  <span class="f-word">PaperFumed · Bengaluru, India</span>
  <span class="f-word">Early stage</span>
</footer>
<script>
var CUR=document.getElementById('CUR'),CUR2=document.getElementById('CUR2');
var hasHover=window.matchMedia('(hover:hover) and (pointer:fine)').matches;
var prefersReducedMotion=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
if(hasHover&&!prefersReducedMotion&&CUR&&CUR2){
  var mx=window.innerWidth/2,my=window.innerHeight/2,lx=mx,ly=my,px=mx,py=my,plx=lx,ply=ly;
  document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;},{passive:true});
  (function tick(){
    if(Math.abs(mx-px)>0.1||Math.abs(my-py)>0.1){CUR.style.left=mx+'px';CUR.style.top=my+'px';px=mx;py=my;}
    lx+=(mx-lx)*0.10;ly+=(my-ly)*0.10;
    if(Math.abs(lx-plx)>0.1||Math.abs(ly-ply)>0.1){CUR2.style.left=lx+'px';CUR2.style.top=ly+'px';plx=lx;ply=ly;}
    requestAnimationFrame(tick);
  })();
  document.querySelectorAll('a,button,input,select,textarea').forEach(function(el){
    el.addEventListener('mouseenter',function(){document.body.classList.add('cbig');});
    el.addEventListener('mouseleave',function(){document.body.classList.remove('cbig');});
  });
}
</script>
</body>
</html>
